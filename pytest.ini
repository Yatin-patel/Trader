[pytest]
# Integration tests live in tests/. Each end-to-end test spins up a
# throwaway MySQL database, mocks Alpaca, runs one Worker cycle, and
# asserts the full Scanner -> Strategist -> Guardrail -> Executor
# pipeline produced a SUBMITTED order.
testpaths = tests
asyncio_mode = auto
# Only show the bottom of long stack traces; the SQL queries that come
# back from pymysql errors get noisy fast.
addopts = -ra --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
